
services:
  db:
    image: postgres:16-alpine
    container_name: todo-db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_8:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
    container_name: todo-app
    command: ["/code/docker_scripts/app.sh"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./app:/code/app
      - ./data:/code/data
      - ./scripts:/code/scripts
      - ./images:/code/images
      - ./files:/code/files
      - ./migrations:/code/migrations
      - ./templates:/code/templates
    networks:
      - app-network


  elasticsearch:
    image: elasticsearch:9.3.0
    container_name: todo-elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - app-network
    ports:
      - "9200:9200"
      - "9300:9300"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s  # ES долго стартует, даём запас


  kibana:
    image: kibana:9.3.0
    container_name: todo-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SSL_VERIFICATION_MODE=none
      - XPACK_SECURITY_ENABLED=false

    networks:
      - app-network
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

networks:
  app-network:  # Исправлено
    driver: bridge

volumes:
  postgres_data_8:


